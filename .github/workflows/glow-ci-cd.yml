name: GLOW CI/CD

on:
  pull_request:
    branches:
      - main
      - migrate/florca-alpine-sharp
    paths:
      - client/**
      - server/**
      - .github/workflows/glow-ci-cd.yml
  push:
    branches:
      - main
      - migrate/florca-alpine-sharp
    paths:
      - client/**
      - server/**
      - .github/workflows/glow-ci-cd.yml
  workflow_dispatch:
    inputs:
      deploy_florca:
        description: Deploy FLORCA after all checks pass
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: glow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GLOW_PUBLIC_API_BASE_URL: ${{ vars.GLOW_PUBLIC_API_BASE_URL || 'https://api.glow.ge/api/v1' }}
  GLOW_PUBLIC_SITE_URL: ${{ vars.GLOW_PUBLIC_SITE_URL || 'https://glow.ge' }}
  GLOW_LAUNCH_MODE: ${{ vars.GLOW_LAUNCH_MODE || 'false' }}
  GLOW_BOOKING_ONLINE_PAYMENTS_ENABLED: ${{ vars.GLOW_BOOKING_ONLINE_PAYMENTS_ENABLED || 'false' }}
  GLOW_GA_ID: ${{ vars.GLOW_GA_ID || '' }}

jobs:
  client:
    name: Client typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ env.GLOW_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ env.GLOW_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_LAUNCH_MODE: ${{ env.GLOW_LAUNCH_MODE }}
          NEXT_PUBLIC_BOOKING_ONLINE_PAYMENTS_ENABLED: ${{ env.GLOW_BOOKING_ONLINE_PAYMENTS_ENABLED }}
          NEXT_PUBLIC_GA_ID: ${{ env.GLOW_GA_ID }}

  server:
    name: Server typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f server/Dockerfile server

      - name: Build client image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${GLOW_PUBLIC_API_BASE_URL}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${GLOW_PUBLIC_SITE_URL}" \
            --build-arg NEXT_PUBLIC_LAUNCH_MODE="${GLOW_LAUNCH_MODE}" \
            --build-arg NEXT_PUBLIC_BOOKING_ONLINE_PAYMENTS_ENABLED="${GLOW_BOOKING_ONLINE_PAYMENTS_ENABLED}" \
            --build-arg NEXT_PUBLIC_GA_ID="${GLOW_GA_ID}" \
            -f client/Dockerfile client

  deploy-florca:
    name: Deploy FLORCA
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - client
      - server
      - docker
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_florca) || (github.event_name == 'push' && github.ref_name == vars.GLOW_PRODUCTION_BRANCH && vars.GLOW_AUTO_DEPLOY == 'true') }}
    steps:
      - name: Trigger Coolify deploys
        env:
          COOLIFY_BASE_URL: ${{ vars.FLORCA_COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.FLORCA_COOLIFY_TOKEN }}
          SERVER_UUID: ${{ vars.FLORCA_GLOW_SERVER_UUID }}
          CLIENT_UUID: ${{ vars.FLORCA_GLOW_CLIENT_UUID }}
        shell: bash
        run: |
          set -euo pipefail

          require() {
            if [ -z "${!1:-}" ]; then
              echo "::error::$1 is not configured"
              exit 1
            fi
          }

          require COOLIFY_BASE_URL
          require COOLIFY_TOKEN
          require SERVER_UUID
          require CLIENT_UUID

          base_url="${COOLIFY_BASE_URL%/}"

          deploy() {
            local name="$1"
            local uuid="$2"
            echo "Triggering ${name} deploy in Coolify"
            curl --fail-with-body --silent --show-error --retry 3 \
              --request GET \
              --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
              --header "Accept: application/json" \
              "${base_url}/api/v1/deploy?uuid=${uuid}" >/tmp/coolify-${name}.json
            echo "${name} deploy accepted"
          }

          deploy server "${SERVER_UUID}"
          deploy client "${CLIENT_UUID}"
